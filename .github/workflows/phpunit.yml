name: PHPUnit Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: PHPUnit (PHP 8.3)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: stock-sync

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@9e72090525849be5f74789fc49d76c570bb21d22 # v2.33.0
        with:
          php-version: '8.3'
          extensions: zip, dom, xml, mbstring
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-html tests/coverage --coverage-clover tests/coverage/coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: stock-sync/tests/coverage/
